kind = "web"
previewPath = "/"
title = "CrossList Dashboard"
version = "1.0.0"
id = "artifacts/crosslist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18262

[services.development]
run = "pnpm --filter @workspace/crosslist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crosslist", "run", "build" ]
publicDir = "artifacts/crosslist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18262"
BASE_PATH = "/"
